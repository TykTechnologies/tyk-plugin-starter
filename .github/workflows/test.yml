name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  starter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm test
      - run: npm run build

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: plugin-bundle-starter
          path: dist/
          retention-days: 7

  examples:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - jws-request-signing
          - response-pii-redaction
          - auth-check-hmac
          - post-correlation-id
          - post-key-auth-tenant-context
    defaults:
      run:
        working-directory: examples/${{ matrix.example }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: examples/${{ matrix.example }}/package-lock.json

      - run: npm ci
      - run: npm test
      - run: npm run build:bundle

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: bundle-${{ matrix.example }}
          path: examples/${{ matrix.example }}/dist/bundle.zip
          retention-days: 7
